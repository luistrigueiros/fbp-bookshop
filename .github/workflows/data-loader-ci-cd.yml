name: Library Data Loader CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/library-data-loader/**"
      - "packages/library-data-layer/**"
      - "packages/library-excel-extractor/**"
      - "package.json"
      - "bun.lock"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/library-data-loader/**"
      - "packages/library-data-layer/**"
      - "packages/library-excel-extractor/**"
      - "package.json"
      - "bun.lock"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: packages/library-data-loader

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Run linter
        run: bun run lint || true

      - name: Run tests
        run: bun test

      - name: Run tests with coverage
        run: bun test --coverage

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://library-data-loader-staging.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev
    
    defaults:
      run:
        working-directory: packages/library-data-loader

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Run preconfig
        run: bun run preconfig
        env:
          DATABASE_ID: ${{ secrets.STAGING_DATABASE_ID }}

      - name: Run database migrations
        run: |
          bunx wrangler d1 migrations apply library-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
          workingDirectory: packages/library-data-loader

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://library-data-loader.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev
    
    defaults:
      run:
        working-directory: packages/library-data-loader

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Run preconfig
        run: bun run preconfig
        env:
          DATABASE_ID: ${{ secrets.PRODUCTION_DATABASE_ID }}

      - name: Run database migrations
        run: |
          bunx wrangler d1 migrations apply library-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: packages/library-data-loader

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

name: Library Excel Export CI

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/library-excel-export/**"
      - "package.json"
      - "bun.lock"
  pull_request:
    branches: ["main"]
    paths:
      - "packages/library-excel-export/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

jobs:
  build:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/library-excel-export

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

name: Library Excel Extractor CI

on:
  workflow_dispatch: {}
  push:
    branches: ["**"]
    paths:
      - "packages/library-excel-extractor/**"
      - "package.json"
      - "bun.lock"
  pull_request:
    branches: ["main"]
    paths:
      - "packages/library-excel-extractor/**"
      - "package.json"
      - "bun.lock"

jobs:
  build:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/library-excel-extractor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run build:types

      - name: Test with Coverage
        run: bun test --coverage

      - name: Build
        run: bun run build

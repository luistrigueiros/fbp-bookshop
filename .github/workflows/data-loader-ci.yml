name: Library Data Loader CI/CD

on:
  workflow_dispatch: {}
  push:
    branches: [main, develop]
    paths:
      - "packages/library-data-loader/**"
      - "packages/library-data-layer/**"
      - "packages/library-excel-extractor/**"
      - "package.json"
      - "bun.lock"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/library-data-loader/**"
      - "packages/library-data-layer/**"
      - "packages/library-excel-extractor/**"
      - "package.json"
      - "bun.lock"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: packages/library-data-loader

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Run linter
        run: bun run lint || true

      - name: Run tests
        run: bun test

      - name: Run tests with coverage
        run: bun test --coverage

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://library-data-loader.${{ vars.CLOUDFLARE_ACCOUNT_ID }}.workers.dev
    
    defaults:
      run:
        working-directory: packages/library-data-loader

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .


      - name: Deploy to production
        run: bun run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}



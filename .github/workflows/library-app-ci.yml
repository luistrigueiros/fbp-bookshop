name: Library App CI/CD

on:
  workflow_dispatch: {}
  push:
    branches: [main, develop]
    paths:
      - "packages/library-app/**"
      - "packages/library-data-layer/**"
      - "package.json"
      - "bun.lock"
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/library-app/**"
      - "packages/library-data-layer/**"
      - "package.json"
      - "bun.lock"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    defaults:
      run:
        working-directory: packages/library-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Run linter
        run: bun run lint || true

      - name: Run tests
        run: bun test

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    needs: test
    defaults:
      run:
        working-directory: packages/library-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Create wrangler.toml
        run: envsubst < wrangler.toml.template > wrangler.toml
        env:
          DATABASE_ID: ${{ secrets.DATABASE_ID }}

      - name: Deploy to production
        run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
